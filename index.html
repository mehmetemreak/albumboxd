<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Album Dosyasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0E0D0C; --panel: #151310; --border: #3A342C;
    --text: #EDE6D6; --muted: #8A8072; --faint: #5A5348;
    --gold: #C9A24B; --gold-hover: #D9B461; --body-text: #C9C2B4; --red: #C9704B;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; }
  .display { font-family: 'Fraunces', serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  aside { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 20px; }
  aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }
  .arc-item { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--muted); padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: inherit; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .arc-item:hover { color: var(--text); }
  .arc-item.active { background: #1B1814; color: var(--gold); }
  .arc-item small { display: block; font-size: 10px; color: var(--faint); }

  main { flex: 1; padding: 40px 24px; max-width: 760px; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .sub { font-size: 11px; color: var(--muted); margin-bottom: 32px; }

  .form { border: 1px solid var(--border); background: var(--panel); border-radius: 8px; padding: 20px; margin-bottom: 32px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  input { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: inherit; }
  input:focus { outline: none; border-color: var(--gold); }
  input::placeholder { color: var(--faint); }
  button.go { display: inline-flex; align-items: center; gap: 8px; background: var(--gold); color: var(--bg); border: none; font-weight: 500; font-size: 13px; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; }
  button.go:hover { background: var(--gold-hover); }
  button.go:disabled { background: var(--faint); cursor: wait; }

  .err { font-size: 12px; color: var(--red); border: 1px solid rgba(201,112,75,.4); border-radius: 4px; padding: 8px 12px; margin-bottom: 24px; }
  .hint { font-size: 12px; color: var(--faint); margin-top: 10px; line-height: 1.5; }

  .head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .head .t { font-size: 24px; }
  .head .a { font-size: 13px; color: var(--muted); }
  .del { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 16px; }
  .del:hover { color: var(--red); }

  .card { border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .card-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .card-head .l { font-size: 13px; font-weight: 500; }
  .card-head .h { font-size: 10px; color: var(--faint); margin-left: auto; }
  .card p, .card li { font-size: 13px; color: var(--body-text); line-height: 1.65; }
  .card ul { list-style: none; }
  .card li { padding: 3px 0; border-bottom: 1px dashed #26221C; }
  .card li:last-child { border-bottom: none; }
  .card li b { color: var(--text); font-weight: 500; }
  .tag { display: inline-block; font-size: 10px; color: var(--gold); border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; margin: 2px 3px 2px 0; }
  .src { font-size: 10px; color: var(--faint); margin-top: 8px; }
  .src a { color: var(--muted); }
  .empty { border: 1px dashed var(--border); border-radius: 8px; padding: 40px; text-align: center; font-size: 13px; color: var(--muted); }
  @media (max-width: 700px) { body { flex-direction: column; } aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); } .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <aside>
    <h2>Arsiv</h2>
    <div id="archive-list"></div>
  </aside>
  <main>
    <h1 class="display">Album Dosyasi</h1>
    <p class="sub">musicbrainz + wikipedia · veri-temelli, halusinasyonsuz</p>

    <div class="form">
      <div class="row">
        <input id="in-album" placeholder="Album adi" />
        <input id="in-artist" placeholder="Sanatci" />
      </div>
      <button class="go" id="btn-go" onclick="generate()">Dossier Olustur</button>
      <p class="hint">Veri kaynaklari: MusicBrainz (kredi/label/tarih — kesin veri) ve Wikipedia (baglam ozeti). Ikisi de acik lisansli, telif derdi yok.</p>
    </div>

    <div id="err" class="err" style="display:none"></div>
    <div id="dossier"></div>
  </main>

<script>
const STORE = "album-dossier-site:v1";
let archive = {};
let active = null;

try { archive = JSON.parse(localStorage.getItem(STORE) || "{}"); } catch (e) { archive = {}; }

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const keyFor = (al, ar) => ar.trim().toLowerCase() + "::" + al.trim().toLowerCase();

function save() { localStorage.setItem(STORE, JSON.stringify(archive)); }

function showErr(msg) { const e = $("err"); e.textContent = msg; e.style.display = "block"; }
function clearErr() { $("err").style.display = "none"; }

// ---- MusicBrainz ----
// Rate limit: 1 req/sec. Be polite: identify the app via query param not needed for browser,
// but keep sequential requests spaced.
const MB = "https://musicbrainz.org/ws/2";
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

async function mbJson(url) {
  const res = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!res.ok) throw new Error("MusicBrainz " + res.status);
  return res.json();
}

async function fetchMusicBrainz(album, artist) {
  // 1) find release-group
  const q = encodeURIComponent(`releasegroup:"${album}" AND artist:"${artist}"`);
  const search = await mbJson(`${MB}/release-group/?query=${q}&fmt=json&limit=5`);
  const rg = (search["release-groups"] || [])[0];
  if (!rg) return null;

  await sleep(1100);
  // 2) release-group details with relations + releases
  const detail = await mbJson(`${MB}/release-group/${rg.id}?inc=artist-credits+releases+genres+url-rels&fmt=json`);

  // 3) pick earliest release, get its labels + recording credits summary
  const releases = (detail.releases || []).slice().sort((a, b) => (a.date || "9999").localeCompare(b.date || "9999"));
  const first = releases[0];
  let labels = [], producers = [], engineers = [];
  if (first) {
    await sleep(1100);
    const rel = await mbJson(`${MB}/release/${first.id}?inc=labels+recordings+artist-rels+recording-level-rels+work-rels&fmt=json`);
    labels = (rel["label-info"] || []).map((l) => l.label && l.label.name).filter(Boolean);
    const seen = new Set();
    (rel.media || []).forEach((m) => (m.tracks || []).forEach((t) => {
      const recRels = (t.recording && t.recording.relations) || [];
      recRels.forEach((r) => {
        const name = r.artist && r.artist.name;
        if (!name || seen.has(r.type + name)) return;
        seen.add(r.type + name);
        if (/producer/i.test(r.type)) producers.push(name);
        else if (/engineer|mix|master/i.test(r.type)) engineers.push(name);
      });
    }));
  }

  return {
    id: rg.id,
    title: detail.title,
    artist: (detail["artist-credit"] || []).map((a) => a.name).join(""),
    firstDate: detail["first-release-date"] || (first && first.date) || "",
    type: detail["primary-type"] || "",
    genres: (detail.genres || []).sort((a,b) => b.count - a.count).slice(0, 6).map((g) => g.name),
    labels: [...new Set(labels)],
    producers: [...new Set(producers)].slice(0, 8),
    engineers: [...new Set(engineers)].slice(0, 8),
    url: `https://musicbrainz.org/release-group/${rg.id}`,
  };
}

// ---- Wikipedia ----
async function fetchWikipedia(album, artist) {
  const sq = encodeURIComponent(`${album} ${artist} album`);
  const s = await (await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${sq}&format=json&origin=*&srlimit=3`)).json();
  const hit = ((s.query || {}).search || [])[0];
  if (!hit) return null;
  const t = encodeURIComponent(hit.title);
  const sum = await (await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${t}`)).json();
  return {
    title: sum.title,
    extract: sum.extract || "",
    url: (sum.content_urls && sum.content_urls.desktop && sum.content_urls.desktop.page) || `https://en.wikipedia.org/wiki/${t}`,
  };
}

// ---- Generate ----
async function generate() {
  const album = $("in-album").value.trim();
  const artist = $("in-artist").value.trim();
  if (!album || !artist) return;
  clearErr();
  const btn = $("btn-go");
  btn.disabled = true; btn.textContent = "Hazirlaniyor...";

  try {
    const [mb, wiki] = await Promise.all([
      fetchMusicBrainz(album, artist).catch(() => null),
      fetchWikipedia(album, artist).catch(() => null),
    ]);
    if (!mb && !wiki) throw new Error("Iki kaynakta da sonuc yok. Yazimi kontrol et.");

    const k = keyFor(album, artist);
    archive[k] = {
      album: (mb && mb.title) || album,
      artist: (mb && mb.artist) || artist,
      createdAt: new Date().toISOString(),
      mb, wiki,
    };
    save();
    active = k;
    render();
    $("in-album").value = ""; $("in-artist").value = "";
  } catch (e) {
    showErr("Dossier uretilemedi: " + e.message);
  } finally {
    btn.disabled = false; btn.textContent = "Dossier Olustur";
  }
}

function removeEntry(k) {
  delete archive[k];
  if (active === k) active = null;
  save(); render();
}

function setActive(k) { active = k; render(); }

// ---- Render ----
function render() {
  // sidebar
  const list = Object.entries(archive).sort((a, b) => new Date(b[1].createdAt) - new Date(a[1].createdAt));
  $("archive-list").innerHTML = list.length
    ? list.map(([k, e]) => `
        <button class="arc-item ${active === k ? "active" : ""}" onclick="setActive('${esc(k)}')">
          ${esc(e.album)}<small>${esc(e.artist)}</small>
        </button>`).join("")
    : '<p style="font-size:12px;color:var(--faint)">Henuz dossier yok.</p>';

  // main
  const d = $("dossier");
  if (!active || !archive[active]) {
    d.innerHTML = '<div class="empty">Bir albüm gir ya da arşivden seç.</div>';
    return;
  }
  const e = archive[active];
  const mb = e.mb, wiki = e.wiki;

  d.innerHTML = `
    <div class="head">
      <div>
        <p class="t display">${esc(e.album)}</p>
        <p class="a">${esc(e.artist)}${mb && mb.firstDate ? ` <span class="mono">· ${esc(mb.firstDate)}</span>` : ""}</p>
      </div>
      <button class="del" onclick="removeEntry('${esc(active)}')" aria-label="Sil">×</button>
    </div>

    ${mb ? `
    <div class="card">
      <div class="card-head"><span class="l">Kunye</span><span class="h">musicbrainz — kesin veri</span></div>
      <ul>
        ${mb.firstDate ? `<li><b>Ilk yayin:</b> <span class="mono">${esc(mb.firstDate)}</span></li>` : ""}
        ${mb.labels.length ? `<li><b>Label:</b> ${esc(mb.labels.join(", "))}</li>` : ""}
        ${mb.producers.length ? `<li><b>Produktor:</b> ${esc(mb.producers.join(", "))}</li>` : ""}
        ${mb.engineers.length ? `<li><b>Muhendislik/Mix:</b> ${esc(mb.engineers.join(", "))}</li>` : ""}
      </ul>
      ${mb.genres.length ? `<div style="margin-top:10px">${mb.genres.map((g) => `<span class="tag">${esc(g)}</span>`).join("")}</div>` : ""}
      <p class="src">Kaynak: <a href="${esc(mb.url)}" target="_blank" rel="noopener">MusicBrainz</a> — produktor ismi buradan geliyorsa uydurma degildir; zincirleme onerilerinin ham maddesi.</p>
    </div>` : ""}

    ${wiki && wiki.extract ? `
    <div class="card">
      <div class="card-head"><span class="l">Baglam Ozeti</span><span class="h">wikipedia</span></div>
      <p>${esc(wiki.extract)}</p>
      <p class="src">Kaynak: <a href="${esc(wiki.url)}" target="_blank" rel="noopener">${esc(wiki.title)} — Wikipedia</a> · Derin okuma icin linke git; bu ozet giris paragrafi.</p>
    </div>` : ""}

    <div class="card">
      <div class="card-head"><span class="l">Yorum Katmani</span><span class="h">manuel / llm</span></div>
      <p>Bu MVP bilerek yorum uretmiyor — yukaridaki veri katmani kesin, yorum katmani ise ayri bir is.
      Soz cozumlemesi ve donem analizi icin bu kunyeyi Claude sohbetine tasi: veriyi eline tutusturursan
      halusinasyon alani kalmaz. v2'de buraya opsiyonel LLM entegrasyonu eklenebilir (kendi API key'inle).</p>
    </div>
  `;
}

render();
</script>
</body>
</html>
